# Build app image, push to GHCR, trigger Portainer webhook to redeploy.
# Secrets: set PORTAINER_WEBHOOK_URL in repo Settings → Secrets → Actions.

name: Build and Deploy (GHCR)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/n45os/sub5tr4cker:${{ steps.vars.outputs.tag }}
            ghcr.io/n45os/sub5tr4cker:latest

      - name: Deploy to Portainer
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        if: env.WEBHOOK != ''
        run: curl -sf -X POST "$WEBHOOK"
