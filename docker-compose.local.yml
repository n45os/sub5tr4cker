# local dev: only MongoDB. run Next.js with pnpm dev
services:
  mongo:
    image: mongo:7
    ports:
      - "25417:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
