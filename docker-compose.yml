services:
  app:
    build: .
    ports:
      - "3054:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/substrack
      - NODE_ENV=production
    env_file:
      - .env.local
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "25417:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # cron runner — same image, different entrypoint
  cron:
    build:
      context: .
      target: builder
    command: ["pnpm", "run", "cron"]
    environment:
      - MONGODB_URI=mongodb://mongo:27017/substrack
      - NODE_ENV=production
    env_file:
      - .env.local
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo-data:
