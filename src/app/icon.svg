<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- 270° clockwise arc: right → bottom → left → top -->
  <path d="M24 16A8 8 0 1 1 16 8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- arrowhead pointing right at arc tip -->
  <path d="M14 6L16 8L14 10" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- checkmark -->
  <path d="M12 17L14.5 19.5L20.5 13" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
